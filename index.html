<html lang="ko">
<head>
<meta charset="UTF-8">

<title>리치트레이딩 | 링크</title>

<!-- ─── 링크 미리보기(카톡·인스타 DM 공유 시) ─── -->
<meta property="og:title" content="리치트레이딩 RICH TRADING">
<meta property="og:description" content="BTC 실전매매 · 트레이딩 챌린지 · 실시간 시그널">
<meta property="og:type" content="website">
<meta name="theme-color" content="#07090c">

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👑</text></svg>">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">

<style>
  :root {
    --bg: #07090c;
    --card: rgba(255, 255, 255, 0.045);
    --card-border: rgba(255, 255, 255, 0.09);
    --gold: #d9b344;
    --gold-hi: #f0d468;
    --gold-dim: rgba(217, 179, 68, 0.14);
    --green: #00e07f;
    --red: #ff5b5b;
    --text: #eef2f0;
    --text-dim: #8a949e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    overflow-x: hidden;
    min-height: 100dvh;
  }

  /* ─── 배경: 골드 글로우만 (은은하게) ─── */
  .glow {
    position: fixed;
    width: 130vw; height: 55vh;
    left: 50%; top: -18vh;
    transform: translateX(-50%);
    background: radial-gradient(ellipse at center, rgba(217, 179, 68, 0.12) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative; z-index: 2;
    max-width: 480px;
    margin: 0 auto;
    padding: clamp(40px, 10vh, 76px) 22px 36px;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100dvh;
  }

  /* ═══ 아바타: 홀로그램 코인 스핀 + 글리치 + 스캔 ═══ */
  .avatar {
    position: relative;
    width: 108px; height: 108px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #141a22, #090c10 70%);
    border: 2px solid rgba(217, 179, 68, 0.6);
    box-shadow: 0 0 38px rgba(217, 179, 68, 0.22), inset 0 0 20px rgba(217, 179, 68, 0.06);
    display: grid; place-items: center;
    animation: float 5s ease-in-out infinite;
    overflow: hidden;
    perspective: 520px;
  }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }

  /* 홀로 스캔 빛줄기 */
  .avatar::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background: linear-gradient(115deg,
      transparent 32%,
      rgba(255, 240, 200, 0.15) 45%,
      rgba(120, 220, 255, 0.10) 53%,
      transparent 66%);
    transform: translateX(-130%);
    animation: holoSweep 4.3s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes holoSweep {
    0%, 52%  { transform: translateX(-130%); }
    78%, 100% { transform: translateX(130%); }
  }

  /* 동전처럼 도는 3D 코인 — 앞면: 골드 크레스트 / 뒷면: 와이어프레임 홀로그램 */
  .coin {
    position: relative;
    width: 82%; height: 82%;
    transform-style: preserve-3d;
    animation: holoSpin 7.5s cubic-bezier(0.55, 0, 0.3, 1) infinite;
  }
  @keyframes holoSpin {
    0%, 46%   { transform: rotateY(0deg); }
    92%, 100% { transform: rotateY(360deg); }
  }
  .face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .face svg { width: 100%; height: 100%; display: block; }
  .face.back {
    transform: rotateY(180deg);
    filter: drop-shadow(0 0 5px rgba(217, 179, 68, 0.55));
    opacity: 0.92;
  }

  /* 글리치 고스트 레이어 — 평소엔 숨김, 주기적으로 RGB 분리+슬라이스 튐 */
  .ghost {
    position: absolute; inset: 0;
    opacity: 0;
    pointer-events: none;
  }
  .g1 { animation: glitch1 4.9s steps(1) infinite; }
  .g2 { animation: glitch2 4.9s steps(1) infinite; }
  @keyframes glitch1 {
    0%, 88.9% { opacity: 0; }
    89%   { opacity: 0.85; transform: translate(-3px, 1px); clip-path: inset(6% 0 60% 0);  filter: hue-rotate(-95deg) saturate(3); }
    91.2% { opacity: 0.85; transform: translate(2px, -1px);  clip-path: inset(52% 0 14% 0); filter: hue-rotate(-95deg) saturate(3); }
    93.5%, 100% { opacity: 0; }
  }
  @keyframes glitch2 {
    0%, 89.3% { opacity: 0; }
    89.4% { opacity: 0.8; transform: translate(3px, -1px); clip-path: inset(38% 0 32% 0); filter: hue-rotate(135deg) saturate(2.6); }
    91.8% { opacity: 0.8; transform: translate(-2px, 2px); clip-path: inset(72% 0 3% 0);  filter: hue-rotate(135deg) saturate(2.6); }
    94%, 100% { opacity: 0; }
  }

  h1 {
    margin-top: 20px;
    font-size: 24px; font-weight: 800; letter-spacing: -0.02em;
  }
  h1 .en { color: var(--gold); }
  .tagline {
    margin-top: 8px;
    color: var(--text-dim);
    font-size: 14.5px; font-weight: 500;
    letter-spacing: 0.01em;
    text-align: center;
  }

  /* ─── 라이브 BTC 시세 ─── */
  .ticker {
    margin-top: 16px;
    display: none;
    align-items: center; gap: 8px;
    padding: 7px 15px;
    border-radius: 999px;
    background: var(--card);
    border: 1px solid var(--card-border);
    font-size: 13.5px; font-weight: 600;
    font-variant-numeric: tabular-nums;
    backdrop-filter: blur(8px);
  }
  .ticker.on { display: inline-flex; }
  .ticker .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
  .ticker .chg.up { color: var(--green); }
  .ticker .chg.down { color: var(--red); }

  /* ─── 링크 버튼 ─── */
  .links {
    margin-top: 34px;
    width: 100%;
    display: flex; flex-direction: column; gap: 14px;
  }
  .btn {
    position: relative;
    display: flex; align-items: center; gap: 15px;
    padding: 17px 19px;
    border-radius: 17px;
    background: var(--card);
    border: 1px solid var(--card-border);
    text-decoration: none; color: var(--text);
    backdrop-filter: blur(10px);
    transition: transform 0.15s ease, border-color 0.2s ease, background 0.2s ease;
    overflow: hidden;
  }
  .btn:active { transform: scale(0.975); }
  @media (hover: hover) {
    .btn:hover { border-color: rgba(217, 179, 68, 0.5); background: rgba(217, 179, 68, 0.05); }
  }
  .btn.primary {
    background: linear-gradient(120deg, rgba(217, 179, 68, 0.17), rgba(217, 179, 68, 0.05));
    border-color: rgba(217, 179, 68, 0.55);
    box-shadow: 0 4px 26px rgba(217, 179, 68, 0.13);
  }
  /* 프라이머리 버튼 슬라이딩 샤인 */
  .btn.primary::after {
    content: '';
    position: absolute; top: 0; bottom: 0; width: 55%;
    background: linear-gradient(105deg, transparent, rgba(255, 235, 170, 0.09), transparent);
    animation: shine 3.2s ease-in-out infinite;
  }
  @keyframes shine { 0% { left: -60%; } 55%, 100% { left: 120%; } }

  .btn .ico {
    flex: none;
    width: 44px; height: 44px;
    border-radius: 12px;
    display: grid; place-items: center;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.07);
  }
  .btn.primary .ico { background: var(--gold-dim); border-color: rgba(217, 179, 68, 0.35); }
  .btn .ico svg { width: 22px; height: 22px; }

  .btn .txt { flex: 1; min-width: 0; }
  .btn .txt b { display: block; font-size: 15.5px; font-weight: 700; letter-spacing: -0.01em; }
  .btn .txt span { display: block; margin-top: 3px; font-size: 12.5px; color: var(--text-dim); font-weight: 500; }
  .btn .arrow { flex: none; color: var(--text-dim); transition: transform 0.2s ease, color 0.2s ease; }
  @media (hover: hover) {
    .btn:hover .arrow { transform: translateX(3px); color: var(--gold); }
  }
  .badge {
    flex: none;
    font-size: 10.5px; font-weight: 800; letter-spacing: 0.04em;
    color: #1a1405;
    background: linear-gradient(135deg, var(--gold-hi), var(--gold));
    padding: 4px 8px; border-radius: 999px;
  }

  /* ─── 푸터 ─── */
  footer {
    margin-top: auto;
    padding-top: 44px;
    text-align: center;
    font-size: 11px; line-height: 1.7;
    color: rgba(138, 148, 158, 0.6);
  }

  @media (prefers-reduced-motion: reduce) {
    .avatar, .avatar::after, .coin, .g1, .g2, .ticker .dot, .btn.primary::after { animation: none; }
  }
</style>
</head>
<body>

<script>
/* ═══════════════════════════════════════════════════════
   크레스트 로고 — 코드로 그리는 벡터 (방패+왕관+T+월계수)
   월계수 잎은 베지어 곡선 위에 수식으로 배치
   ═══════════════════════════════════════════════════════ */
function crestSVG(mode, idp) {
  // 왼쪽 월계수 가지의 줄기 곡선 (오른쪽은 그룹 미러링)
  const A = { x: 94, y: 187 }, B = { x: 12, y: 168 }, C = { x: 24, y: 78 };
  const qp = t => ({
    x: (1 - t) ** 2 * A.x + 2 * (1 - t) * t * B.x + t * t * C.x,
    y: (1 - t) ** 2 * A.y + 2 * (1 - t) * t * B.y + t * t * C.y
  });
  const qt = t => Math.atan2(
    2 * (1 - t) * (B.y - A.y) + 2 * t * (C.y - B.y),
    2 * (1 - t) * (B.x - A.x) + 2 * t * (C.x - B.x)
  ) * 180 / Math.PI;

  let leaves = '';
  for (let i = 0; i < 8; i++) {
    const t = 0.13 + i * 0.115;
    const p = qp(t), th = qt(t);
    const s = 1.02 - Math.abs(t - 0.5) * 0.45;   // 가운데 잎이 가장 큼
    // 잎 축은 로컬 -y 방향 → 줄기 진행방향(th) ± 40°로 벌림
    leaves += `<path class="lf" d="M0 0 Q5.5 -7.5 0 -21 Q-5.5 -7.5 0 0"
      transform="translate(${p.x.toFixed(1)} ${p.y.toFixed(1)}) rotate(${(th + 90 - 40).toFixed(1)}) scale(${s.toFixed(2)})"/>`;
    leaves += `<path class="lf" d="M0 0 Q5.5 -7.5 0 -21 Q-5.5 -7.5 0 0"
      transform="translate(${p.x.toFixed(1)} ${p.y.toFixed(1)}) rotate(${(th + 90 + 40).toFixed(1)}) scale(${(s * 0.9).toFixed(2)})"/>`;
  }
  const stem = `M${A.x} ${A.y} Q${B.x} ${B.y} ${C.x} ${C.y}`;
  const branch = `<path class="st" d="${stem}" fill="none"/>${leaves}`;

  const crown = 'M70 45 L70 20 L85 34 L100 11 L115 34 L130 20 L130 45 Q100 52 70 45 Z';
  const shield = 'M63 53 L137 53 L137 108 Q137 134 100 148 Q63 134 63 108 Z';

  const fillMode = mode === 'fill';
  const defs = fillMode ? `<defs>
      <linearGradient id="${idp}g1" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#f0d468"/><stop offset=".55" stop-color="#c9a227"/><stop offset="1" stop-color="#8a6a1a"/>
      </linearGradient>
      <linearGradient id="${idp}g2" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#e2be4e"/><stop offset="1" stop-color="#775912"/>
      </linearGradient>
      <linearGradient id="${idp}gs" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#e9eaee"/><stop offset="1" stop-color="#aeb2ba"/>
      </linearGradient>
    </defs>` : '';

  const style = fillMode
    ? `<style>.lf{fill:url(#${idp}g1)}.st{stroke:#c9a227;stroke-width:3;stroke-linecap:round}</style>`
    : `<style>.lf,.st,.cr,.sh{fill:none;stroke:#d9b344;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}.tt{fill:none;stroke:#d9b344;stroke-width:1.2}</style>`;

  const crownEl = `<path class="cr" d="${crown}" ${fillMode ? `fill="url(#${idp}g1)"` : ''}/>`;
  const shieldEl = `<path class="sh" d="${shield}" ${fillMode ? `fill="url(#${idp}g2)"` : ''}/>`;
  const tEl = `<text class="tt" x="100" y="127" text-anchor="middle"
      font-family="Georgia,'Times New Roman',serif" font-size="76" font-weight="bold"
      ${fillMode ? `fill="url(#${idp}gs)"` : ''}>T</text>`;

  return `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    ${defs}${style}
    <g>${branch}</g>
    <g transform="translate(200 0) scale(-1 1)">${branch}</g>
    ${crownEl}${shieldEl}${tEl}
  </svg>`;
}

/* 아바타: 3D 코인 (앞면 골드 크레스트 + 글리치 고스트 2장 / 뒷면 와이어프레임) */
document.getElementById('avatar').innerHTML = `
  <div class="coin">
    <div class="face front">
      ${crestSVG('fill', 'av')}
      <div class="ghost g1">${crestSVG('fill', 'ga')}</div>
      <div class="ghost g2">${crestSVG('fill', 'gb')}</div>
    </div>
    <div class="face back">${crestSVG('line', 'bk')}</div>
  </div>`;

/* ─── 라이브 BTC 시세 (바이낸스 공개 API, 실패 시 숨김) ─── */
(async function ticker() {
  const el = document.getElementById('ticker');
  const priceEl = document.getElementById('price');
  const chgEl = document.getElementById('chg');
  async function update() {
    const r = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT');
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    const p = parseFloat(d.lastPrice);
    const c = parseFloat(d.priceChangePercent);
    priceEl.textContent = '$' + p.toLocaleString('en-US', { maximumFractionDigits: 0 });
    chgEl.textContent = (c >= 0 ? '+' : '') + c.toFixed(2) + '%';
    chgEl.className = 'chg ' + (c >= 0 ? 'up' : 'down');
    el.classList.add('on');
  }
  try {
    await update();
    setInterval(() => update().catch(() => {}), 15000);
  } catch (e) { /* 시세 못 가져오면 그냥 숨김 */ }
})();
</script>
